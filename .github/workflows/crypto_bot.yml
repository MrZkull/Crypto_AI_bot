name: CryptoBot AI — Trading Scanner

on:
  schedule:
    - cron: '4,19,34,49 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'scan'
        type: choice
        options: [scan, diagnostic]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false
          # Uses your PAT to ensure the bot has permissions to bypass branch protection
          token: ${{ secrets.GH_PAT_TOKEN }}

      - name: Download AI Model
        run: |
          wget -q -O pro_crypto_ai_model.pkl "https://github.com/Elliot14R/Crypto_AI_bot/releases/download/v2.0/pro_crypto_ai_model.pkl"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env from secrets
        run: |
          echo "BINANCE_API_KEY=${{ secrets.BINANCE_API_KEY }}"         >> .env
          echo "BINANCE_SECRET=${{ secrets.BINANCE_SECRET }}"           >> .env
          echo "TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}"           >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}"       >> .env
          echo "GH_PAT_TOKEN=${{ secrets.GH_PAT_TOKEN }}"               >> .env
          echo "GITHUB_REPO=Elliot14R/Crypto_AI_bot"                    >> .env
          echo "GITHUB_BRANCH=main"                                     >> .env
          echo "DERIBIT_CLIENT_ID=${{ secrets.DERIBIT_CLIENT_ID }}"         >> .env
          echo "DERIBIT_CLIENT_SECRET=${{ secrets.DERIBIT_CLIENT_SECRET }}" >> .env

      - name: Restore state files
        uses: actions/cache@v4
        id: state-cache
        with:
          path: |
            trades.json
            trade_history.json
            signals.json
            scan_mode.json
            balance.json
            data/
          key: bot-state-v4-${{ github.run_id }}
          restore-keys: |
            bot-state-v4-

      - name: Init state files if missing
        run: |
          [ -f trades.json ]        || echo '{}' > trades.json
          [ -f trade_history.json ] || echo '[]' > trade_history.json
          [ -f signals.json ]       || echo '[]' > signals.json
          [ -f scan_mode.json ]     || echo '{}' > scan_mode.json
          [ -f balance.json ]       || echo '{}' > balance.json
          mkdir -p data

      - name: Run bot
        run: |
          if [ "${{ github.event.inputs.mode }}" = "diagnostic" ]; then
            python trade_executor.py diagnostic
          else
            python trade_executor.py
          fi

      - name: Save state to Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            trades.json
            trade_history.json
            signals.json
            scan_mode.json
            balance.json
            data/
          key: bot-state-v4-${{ github.run_id }}

      - name: Commit and Push State to Repo
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. DELETE the secrets file so it never gets committed!
          rm -f .env
          
          # 2. Stage EVERYTHING else
          git add -A
          
          # 3. Commit locally
          git commit -m "Sync Bot State [skip ci]" || echo "No changes to commit"
          
          # 4. Pull with rebase AND autostash
          git pull --rebase origin main --autostash
          
          # 5. Push back to the repo
          git push origin main
