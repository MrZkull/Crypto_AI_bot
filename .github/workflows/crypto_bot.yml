name: CryptoBot AI — Smart Scanner

on:
  schedule:
    # Every 15 minutes
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'scan'
        type: choice
        options:
          - scan
          - diagnostic
          - clear_stuck   # NEW: clears the 4 stuck trades

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env
        run: |
          echo "TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}"     >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "CRYPTOPANIC_KEY=${{ secrets.CRYPTOPANIC_KEY }}"   >> .env
          echo "BINANCE_API_KEY=${{ secrets.BINANCE_API_KEY }}"   >> .env
          echo "BINANCE_SECRET=${{ secrets.BINANCE_SECRET }}"     >> .env
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}"         >> .env
          echo "GH_PAT_TOKEN=${{ secrets.GH_PAT_TOKEN }}"         >> .env
          echo "GITHUB_REPO=${{ github.repository }}"             >> .env

      - name: Restore model
        uses: actions/cache@v4
        with:
          path: pro_crypto_ai_model.pkl
          key: model-${{ hashFiles('model_performance.json') }}

      - name: Restore state files
        uses: actions/cache@v4
        with:
          path: |
            trades.json
            trade_history.json
            signals.json
            scan_mode.json
            balance.json
          key: bot-state-${{ github.run_id }}
          restore-keys: |
            bot-state-

      - name: Init missing state files
        run: |
          [ -f trades.json ]        || echo '{}'  > trades.json
          [ -f trade_history.json ] || echo '[]'  > trade_history.json
          [ -f signals.json ]       || echo '[]'  > signals.json
          [ -f scan_mode.json ]     || echo '{}'  > scan_mode.json
          [ -f balance.json ]       || echo '{}'  > balance.json
          echo "=== Current trades.json ==="
          cat trades.json

      - name: Run bot
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "diagnostic" ]; then
            echo "Running diagnostic..."
            python trade_executor.py diagnostic
          elif [ "$MODE" = "clear_stuck" ]; then
            echo "Clearing stuck trades..."
            python trade_executor.py clear_stuck
          else
            python trade_executor.py
          fi

      - name: Save state files
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            trades.json
            trade_history.json
            signals.json
            scan_mode.json
            balance.json
          key: bot-state-${{ github.run_id }}

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-log-${{ github.run_number }}
          path: bot.log
          retention-days: 7
