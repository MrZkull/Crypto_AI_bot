name: CryptoBot AI — Smart Scanner

on:
  schedule:
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'scan'
        type: choice
        options:
          - scan
          - diagnostic
          - clear_stuck

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env
        run: |
          echo "TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}"     >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "BINANCE_API_KEY=${{ secrets.BINANCE_API_KEY }}"   >> .env
          echo "BINANCE_SECRET=${{ secrets.BINANCE_SECRET }}"     >> .env
          echo "GH_PAT_TOKEN=${{ secrets.GH_PAT_TOKEN }}"         >> .env
          echo "GITHUB_REPO=${{ github.repository }}"             >> .env

      - name: Restore model
        uses: actions/cache@v4
        with:
          path: pro_crypto_ai_model.pkl
          key: model-${{ hashFiles('model_performance.json') }}

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: |
            trades.json
            trade_history.json
            signals.json
            scan_mode.json
            balance.json
          key: bot-state-${{ github.run_id }}
          restore-keys: |
            bot-state-

      - name: Sync state from data/ folder
        run: |
          mkdir -p data
          for f in trades.json trade_history.json signals.json scan_mode.json balance.json; do
            if [ ! -f "$f" ]; then
              if [ -f "data/$f" ]; then
                cp "data/$f" "$f"
                echo "  Restored $f from data/"
              else
                if [[ "$f" == "trades.json" || "$f" == "scan_mode.json" ]]; then
                  echo '{}' > "$f"
                else
                  echo '[]' > "$f"
                fi
                echo "  Created empty $f"
              fi
            fi
          done
          echo "=== trades.json ===" && cat trades.json
          echo "=== balance.json ===" && cat balance.json

      - name: Run bot
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "diagnostic" ]; then
            python trade_executor.py diagnostic
          elif [ "$MODE" = "clear_stuck" ]; then
            python trade_executor.py clear_stuck
          else
            python trade_executor.py
          fi

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            trades.json
            trade_history.json
            signals.json
            scan_mode.json
            balance.json
          key: bot-state-${{ github.run_id }}

      - name: Commit state files to data/ folder
        if: always()
        run: |
          mkdir -p data
          for f in trades.json trade_history.json signals.json scan_mode.json balance.json; do
            [ -f "$f" ] && cp "$f" "data/$f"
          done
          git config user.name  "CryptoBot AI"
          git config user.email "bot@cryptoai.local"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "bot: update state [skip ci]"
            git push
            echo "State files committed to data/"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-log-${{ github.run_number }}
          path: bot.log
          retention-days: 7
