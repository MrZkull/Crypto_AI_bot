name: Crypto AI Bot - Live Scanner

on:
  schedule:
    # Runs every 15 minutes (matches your SCAN_INTERVAL_MIN = 15)
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 12    # safety: kill if hangs before next 15m window

    steps:
      # 1. Checkout your repo (LFS disabled to avoid bandwidth limits)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'           # caches dependencies = faster runs

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Write .env file from GitHub Secrets (keeps tokens safe)
      - name: Create .env file
        run: |
          echo "TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "CRYPTOPANIC_KEY=${{ secrets.CRYPTOPANIC_KEY }}" >> .env

      # 5. Download the actual AI model from GitHub Releases (Fixes KeyError 118)
      - name: Download AI Model
        run: wget -O pro_crypto_ai_model.pkl "https://github.com/Elliot14R/Crypto_AI_bot/releases/download/v1.0-model/pro_crypto_ai_model.pkl"

      # 6. Run a SINGLE scan
      - name: Run live scan
        run: python run_scan_once.py

      # 7. Upload bot log as artifact (optional — helps debugging)
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-log-${{ github.run_number }}
          path: bot.log
          retention-days: 3
