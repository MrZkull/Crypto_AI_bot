# .github/workflows/crypto_bot.yml
# Main bot runner — downloads model from GitHub Release (no LFS needed)
name: CryptoBot AI Scanner

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:
    inputs:
      mode:
        description: 'scan or diagnostic'
        required: false
        default: 'scan'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: false          # skip LFS — model comes from GitHub Releases

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Download model from GitHub Release
        run: |
          REPO="${{ github.repository }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          TAG="model-latest"
          
          echo "Downloading model from release: $TAG"
          
          # Get asset download URL
          ASSET_URL=$(curl -s -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG" | \
            python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assets = d.get('assets', [])
          for a in assets:
              if a['name'] == 'pro_crypto_ai_model.pkl':
                  print(a['url'])
                  break
          ")
          
          if [ -z "$ASSET_URL" ]; then
            echo "ERROR: Model not found in releases. Run Train ML Model workflow first."
            exit 1
          fi
          
          # Download with auth (required for private repos)
          curl -L -s \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/octet-stream" \
            -o pro_crypto_ai_model.pkl \
            "$ASSET_URL"
          
          SIZE=$(du -sh pro_crypto_ai_model.pkl | cut -f1)
          echo "Model downloaded: $SIZE"

      - name: Run bot scan
        env:
          DERIBIT_CLIENT_ID:     ${{ secrets.DERIBIT_CLIENT_ID }}
          DERIBIT_CLIENT_SECRET: ${{ secrets.DERIBIT_CLIENT_SECRET }}
          TELEGRAM_TOKEN:        ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_PAT_TOKEN:          ${{ secrets.GH_PAT_TOKEN }}
        run: |
          MODE="${{ github.event.inputs.mode || 'scan' }}"
          if [ "$MODE" = "diagnostic" ]; then
            python trade_executor.py diagnostic
          else
            python trade_executor.py
          fi

      - name: Sync state files to repo
        run: |
          git config user.name  "CryptoBot AI"
          git config user.email "bot@cryptobot.ai"
          mkdir -p data
          git add data/ trades.json trade_history.json signals.json \
                  balance.json scan_mode.json bot.log 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "Sync Bot State [skip ci]"
          git pull --rebase origin main || true
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
