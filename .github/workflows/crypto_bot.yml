name: CryptoBot AI — Smart Scanner

on:
  schedule:
    # Every 15 minutes — smart_scheduler.py decides internally whether to
    # actually scan (active hours) or skip (low vol / quiet hours)
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Write .env
        run: |
          echo "TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}"     >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "CRYPTOPANIC_KEY=${{ secrets.CRYPTOPANIC_KEY }}"   >> .env
          echo "BINANCE_API_KEY=${{ secrets.BINANCE_API_KEY }}"   >> .env
          echo "BINANCE_SECRET=${{ secrets.BINANCE_SECRET }}"     >> .env

      - name: Restore model
        uses: actions/cache@v4
        with:
          path: pro_crypto_ai_model.pkl
          key: model-${{ hashFiles('model_performance.json') }}

      - name: Restore state files
        uses: actions/cache@v4
        with:
          path: |
            trades.json
            trade_history.json
            signals.json
            scan_mode.json
          key: bot-state-${{ github.run_id }}
          restore-keys: |
            bot-state-

      - name: Run smart scan
        run: python trade_executor.py

      - name: Save state files
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            trades.json
            trade_history.json
            signals.json
            scan_mode.json
          key: bot-state-${{ github.run_id }}

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-log-${{ github.run_number }}
          path: bot.log
          retention-days: 7
