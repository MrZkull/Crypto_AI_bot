name: CryptoBot AI — Trading Scanner

on:
  schedule:
    - cron: '4,19,34,49 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'scan'
        #type: choice
        #options: [scan, diagnostic]
  workflow_run:
    workflows: ["CryptoBot AI — Trading Scanner"]
    types: [completed]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false
          token: ${{ secrets.GH_PAT_TOKEN }}

      - name: Download AI Model
        run: |
          wget -q -O pro_crypto_ai_model.pkl "https://github.com/MrZkull/Crypto_AI_bot/releases/download/v2.0/pro_crypto_ai_model.pkl"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env from secrets
        run: |
          echo "BINANCE_API_KEY=${{ secrets.BINANCE_API_KEY }}"               >> .env
          echo "BINANCE_SECRET=${{ secrets.BINANCE_SECRET }}"                 >> .env
          echo "TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}"                 >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}"             >> .env
          echo "GH_PAT_TOKEN=${{ secrets.GH_PAT_TOKEN }}"                     >> .env
          echo "GITHUB_REPO=MrZkull/Crypto_AI_bot"                            >> .env
          echo "GITHUB_BRANCH=main"                                           >> .env
          echo "DERIBIT_CLIENT_ID=${{ secrets.DERIBIT_CLIENT_ID }}"           >> .env
          echo "DERIBIT_CLIENT_SECRET=${{ secrets.DERIBIT_CLIENT_SECRET }}"   >> .env

      - name: Restore state files
        uses: actions/cache@v4
        id: state-cache
        with:
          path: |
            trades.json
            trade_history.json
            signals.json
            scan_mode.json
            balance.json
            data/
          key: bot-state-v4-${{ github.run_id }}
          restore-keys: |
            bot-state-v4-

      - name: Init state files if missing
        run: |
          [ -f trades.json ]        || echo '{}' > trades.json
          [ -f trade_history.json ] || echo '[]' > trade_history.json
          [ -f signals.json ]       || echo '[]' > signals.json
          [ -f scan_mode.json ]     || echo '{}' > scan_mode.json
          [ -f balance.json ]       || echo '{}' > balance.json
          mkdir -p data

      - name: Run bot
        id: run_bot
        run: |
          if [ "${{ github.event.inputs.mode }}" = "diagnostic" ]; then
            python trade_executor.py diagnostic
          else
            python trade_executor.py
          fi

      - name: Retry bot on failure
        if: failure() && steps.run_bot.outcome == 'failure'
        run: |
          echo "First attempt failed — waiting 30s for Deribit to recover..."
          sleep 30
          if [ "${{ github.event.inputs.mode }}" = "diagnostic" ]; then
            python trade_executor.py diagnostic
          else
            python trade_executor.py
          fi

      - name: Save state to Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            trades.json
            trade_history.json
            signals.json
            scan_mode.json
            balance.json
            data/
          key: bot-state-v4-${{ github.run_id }}

      - name: Commit and Push State to Repo
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Remove secrets and model — never commit these
          rm -f .env pro_crypto_ai_model.pkl
          git rm --cached --ignore-unmatch "*.pkl" "*.joblib" 2>/dev/null || true

          # ── CRITICAL: Backup runtime state to /tmp BEFORE any git operation ──
          # This guarantees our fresh trades.json survives the git pull.
          # Previous stash approach silently failed (stash pop conflict → empty {}).
          cp trades.json        /tmp/trades_runtime.json        2>/dev/null || echo '{}' > /tmp/trades_runtime.json
          cp trade_history.json /tmp/trade_history_runtime.json 2>/dev/null || echo '[]' > /tmp/trade_history_runtime.json
          cp signals.json       /tmp/signals_runtime.json       2>/dev/null || echo '[]' > /tmp/signals_runtime.json
          cp balance.json       /tmp/balance_runtime.json       2>/dev/null || echo '{}' > /tmp/balance_runtime.json
          cp scan_mode.json     /tmp/scan_mode_runtime.json     2>/dev/null || echo '{}' > /tmp/scan_mode_runtime.json

          # Pull latest remote without touching our backed-up state
          git fetch origin main
          git pull --rebase origin main || git pull origin main || true

          # ── CRITICAL: Restore runtime state after pull ──
          # Local runtime data ALWAYS wins over repo — the repo only has stale data.
          cp /tmp/trades_runtime.json        trades.json
          cp /tmp/trade_history_runtime.json trade_history.json
          cp /tmp/signals_runtime.json       signals.json
          cp /tmp/balance_runtime.json       balance.json
          cp /tmp/scan_mode_runtime.json     scan_mode.json

          # Stage and commit only state files — never use "git add ."
          git add trades.json        || true
          git add trade_history.json || true
          git add signals.json       || true
          git add scan_mode.json     || true
          git add balance.json       || true
          git add data/              || true

          git diff --cached --quiet || git commit -m "Sync Bot State [skip ci]"
          git push origin main
