<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoBot AI — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #07090d;
  --bg2:     #0c1018;
  --bg3:     #111820;
  --bg4:     #161f2a;
  --border:  #1a2535;
  --border2: #243040;
  --text:    #f1f5f9; 
  --text2:   #cbd5e1; 
  --text3:   #94a3b8; 
  --green:   #10b981; 
  --green2:  #10b98115;
  --red:     #f43f5e; 
  --red2:    #f43f5e15;
  --amber:   #f59e0b;
  --amber2:  #f59e0b15;
  --blue:    #3b82f6;
  --blue2:   #3b82f615;
  --purple:  #8b5cf6;
  --purple2: #8b5cf615;
  --cyan:    #06b6d4;
  --cyan2:   #06b6d415;
  --nav-w:   220px;
  --mono:    'JetBrains Mono', monospace;
  --sans:    'Syne', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;min-height:100vh;display:flex;overflow-x:hidden}

/* scanlines */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9999}

/* ══ SIDEBAR ══ */
.sidebar{width:var(--nav-w);min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:200}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 2s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 8px var(--green)}50%{box-shadow:0 0 2px var(--green)}}
.logo-text{font-family:var(--sans);font-size:15px;font-weight:800;color:#fff;letter-spacing:-0.3px}
.logo-sub{font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:1px}

.sidebar-section{padding:14px 12px 4px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:7px;cursor:pointer;color:var(--text2);font-size:12px;transition:all 0.15s;position:relative}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--blue2);color:var(--blue);border:1px solid #3b82f630}
.nav-item .nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-item .nav-badge{margin-left:auto;font-size:9px;background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-weight:700}
.nav-item .nav-badge.green{background:var(--green);color:#fff}

.sidebar-bottom{margin-top:auto;padding:12px;border-top:1px solid var(--border)}
.mode-badge{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;font-size:11px;font-weight:500}
.mode-badge.active-mode{background:var(--green2);border:1px solid #10b98130;color:var(--green)}
.mode-badge.quiet-mode{background:var(--purple2);border:1px solid #8b5cf630;color:var(--purple)}
.mode-badge.weekend-mode{background:var(--amber2);border:1px solid #f59e0b30;color:var(--amber)}
.mode-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1.5s ease-in-out infinite}

.sidebar-coins{padding:10px 12px}
.coins-label{font-size:9px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
.coin-chips{display:flex;flex-wrap:wrap;gap:4px}
.coin-chip{font-size:9px;padding:2px 6px;border-radius:3px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all 0.1s}
.coin-chip:hover{border-color:var(--blue);color:var(--blue)}
.coin-chip.has-signal{border-color:var(--green);color:var(--green);background:var(--green2)}

/* ══ MAIN ══ */
.main{margin-left:var(--nav-w);flex:1;display:flex;flex-direction:column;min-height:100vh}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:12px}
.page-title{font-family:var(--sans);font-size:16px;font-weight:800;color:#fff}
.topbar-right{display:flex;align-items:center;gap:10px}
.top-stat{font-size:11px;color:var(--text2);padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:5px}
.top-stat span{color:var(--cyan)}
.live-badge{font-size:10px;padding:4px 10px;border-radius:20px;border:1px solid var(--green);color:var(--green);background:var(--green2);letter-spacing:1px}
.live-badge.offline{border-color:var(--red);color:var(--red);background:var(--red2)}
.btn-scan{font-family:var(--mono);font-size:11px;padding:6px 14px;background:var(--blue2);border:1px solid var(--blue);color:var(--blue);border-radius:5px;cursor:pointer;letter-spacing:0.5px;transition:background 0.15s}
.btn-scan:hover{background:#3b82f630}
.btn-scan:disabled{opacity:0.4;cursor:not-allowed}
.btn-scan.running{border-color:var(--amber);color:var(--amber);background:var(--amber2)}
.last-upd{font-size:10px;color:var(--text3)}

/* ══ PAGES ══ */
.page{display:none;padding:20px 24px;flex:1}
.page.active{display:block}

/* ── Stat grid ── */
.stats-row{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:18px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:13px 15px;position:relative;overflow:hidden;transition:border-color 0.2s}
.stat-card:hover{border-color:var(--border2)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card.c-green::before{background:var(--green)}
.stat-card.c-red::before{background:var(--red)}
.stat-card.c-amber::before{background:var(--amber)}
.stat-card.c-blue::before{background:var(--blue)}
.stat-card.c-purple::before{background:var(--purple)}
.stat-card.c-cyan::before{background:var(--cyan)}
.stat-label{font-size:9px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
.stat-value{font-family:var(--sans);font-size:17px;font-weight:800;color:#fff;line-height:1}
.stat-value.green{color:var(--green)}
.stat-value.red{color:var(--red)}
.stat-value.amber{color:var(--amber)}
.stat-value.blue{color:var(--blue)}
.stat-value.cyan{color:var(--cyan)}
.stat-value.purple{color:var(--purple)}
.stat-sub{font-size:10px;color:var(--text2);margin-top:5px}

/* ── Panel ── */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border);background:var(--bg3)}
.panel-title{font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);display:flex;align-items:center;}
.refresh-icon {cursor:pointer; margin-left:8px; opacity:0.5; transition: opacity 0.2s, transform 0.3s;}
.refresh-icon:hover {opacity:1; transform: rotate(180deg);}
.panel-meta{display:flex;align-items:center;gap:8px}
.panel-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg);border:1px solid var(--border);color:var(--text2)}
.panel-body{padding:14px}

/* ── Grid layouts ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:2fr 1fr;gap:16px}

/* ── Open trade card ── */
.trade-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:13px;margin-bottom:10px;transition:border-color 0.15s,transform 0.1s;position:relative}
.trade-card:hover{border-color:var(--border2);transform:translateX(2px)}
.trade-card.buy{border-left:3px solid var(--green)}
.trade-card.sell{border-left:3px solid var(--red)}
.tc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.tc-sym{font-family:var(--sans);font-size:15px;font-weight:800;color:#fff}
.tc-sym span{color:var(--text3);font-size:11px;font-weight:400}
.dir-tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;letter-spacing:0.5px}
.dir-tag.buy{background:var(--green2);color:var(--green);border:1px solid #10b98140}
.dir-tag.sell{background:var(--red2);color:var(--red);border:1px solid #f43f5e40}
.tc-pnl{font-family:var(--sans);font-size:13px;font-weight:800}
.tc-pnl.pos{color:var(--green)}
.tc-pnl.neg{color:var(--red)}
.tc-prices{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:10px}
.price-box{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:6px 8px}
.price-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.price-val{font-size:11px;font-weight:500}
.price-val.live{color:var(--cyan)}
.price-val.entry{color:var(--blue)}
.price-val.sl{color:var(--red)}
.price-val.tp{color:var(--green)}
.prog-wrap{margin-bottom:10px}
.prog-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:3px}
.prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));transition:width 0.8s ease}
.tc-footer{display:flex;align-items:center;justify-content:space-between}
.conf-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.conf-mini{width:44px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.conf-fill{height:100%;background:var(--amber);border-radius:2px}
.btn-close-trade{font-size:10px;padding:3px 9px;background:transparent;border:1px solid var(--red);color:var(--red);border-radius:3px;cursor:pointer;font-family:var(--mono);transition:background 0.15s}
.btn-close-trade:hover{background:var(--red2)}

/* ── Signal cards ── */
.signal-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px;transition:border-color 0.15s}
.signal-card:hover{border-color:var(--border2)}
.signal-card.buy{border-left:3px solid var(--green)}
.signal-card.sell{border-left:3px solid var(--red)}
.sc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sc-left{display:flex;align-items:center;gap:10px}
.sc-sym{font-family:var(--sans);font-size:14px;font-weight:800;color:#fff}
.sc-conf{font-size:11px;color:var(--text2)}
.sc-conf span{color:var(--amber)}
.sc-time{font-size:10px;color:var(--text3)}
.sc-prices{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.sc-box{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:7px 9px}
.sc-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.sc-val{font-size:11px;font-weight:500;color:var(--text)}
.sc-val.entry{color:var(--blue)}
.sc-val.sl{color:var(--red)}
.sc-val.tp{color:var(--green)}
.stars{color:var(--amber);font-size:11px;letter-spacing:-1px}

/* ── Signal filters ── */
.signal-filters{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.filter-group{display:flex;flex-wrap:wrap;gap:4px}
.fbtn{font-size:11px;padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-family:var(--mono);transition:all 0.12s}
.fbtn:hover{border-color:var(--border2);color:var(--text)}
.fbtn.active{background:var(--blue2);border-color:var(--blue);color:var(--blue)}
.fbtn.buy-btn.active{background:var(--green2);border-color:var(--green);color:var(--green)}
.fbtn.sell-btn.active{background:var(--red2);border-color:var(--red);color:var(--red)}
.filter-sep{width:1px;height:20px;background:var(--border);flex-shrink:0;margin:0 4px;}

/* ── Market cards ── */
.market-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;transition:border-color 0.15s,transform 0.1s}
.market-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.mc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mc-sym{font-family:var(--sans);font-size:13px;font-weight:700;color:#fff}
.mc-chg{font-size:11px;padding:2px 7px;border-radius:3px;font-weight:600}
.mc-chg.up{background:var(--green2);color:var(--green)}
.mc-chg.down{background:var(--red2);color:var(--red)}
.mc-price{font-family:var(--sans);font-size:16px;font-weight:800;color:#fff;margin-bottom:6px}
.mc-vol{font-size:10px;color:var(--text3);margin-bottom:8px}
.mc-range{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:4px;position:relative}
.mc-range-fill{position:absolute;height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--cyan))}
.mc-range-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--text3)}

/* ── Fear & Greed ── */
.fg-wrap{padding:16px}
.fg-num{font-family:var(--sans);font-size:36px;font-weight:800;line-height:1;margin-bottom:4px}
.fg-label{font-size:12px;color:var(--text2);margin-bottom:14px}
.fg-bar{height:8px;border-radius:4px;overflow:hidden;background:linear-gradient(90deg,#10b981,#3b82f6,#f59e0b,#f43f5e);margin-bottom:10px;position:relative}
.fg-bar-cursor{position:absolute;top:-2px;width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid var(--bg);transform:translateX(-50%);transition:left 0.5s ease}
.fg-zones{display:flex;flex-direction:column;gap:4px}
.fg-zone{display:flex;justify-content:space-between;font-size:10px;padding:3px 6px;border-radius:3px}
.fg-zone.active-zone{background:var(--bg3)}

/* ── Volatility banner ── */
.vol-banner{border-radius:6px;padding:8px 12px;font-size:11px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.vol-banner.high{background:var(--red2);border:1px solid #f43f5e40;color:var(--red)}
.vol-banner.low{background:var(--amber2);border:1px solid #f59e0b40;color:var(--amber)}
.vol-banner.normal{background:var(--green2);border:1px solid #10b98130;color:var(--green)}

/* ── Log panel ── */
.log-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;height:220px;overflow-y:auto;padding:10px 12px;font-size:11px;line-height:1.9;color:var(--text2)}
.log-box::-webkit-scrollbar{width:3px}
.log-box::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.log-line.sig{color:var(--green)}
.log-line.err{color:var(--red)}
.log-line.wrn{color:var(--amber)}

/* ── History table ── */
.htable{width:100%;border-collapse:collapse}
.htable th{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;font-weight:400}
.htable td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:11px}
.htable tr:last-child td{border-bottom:none}
.htable tr:hover td{background:var(--bg3)}
.tag{font-size:9px;padding:2px 7px;border-radius:3px;font-weight:600;letter-spacing:0.5px}
.tag.buy{background:var(--green2);color:var(--green)}
.tag.sell{background:var(--red2);color:var(--red)}
.tag.win{background:var(--green2);color:var(--green)}
.tag.loss{background:var(--red2);color:var(--red)}

/* ── Scanning mode indicator ── */
.scan-mode-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:7px;margin-bottom:16px;font-size:11px}
.scan-mode-bar.active-mode{background:var(--green2);border:1px solid #10b98130;color:var(--green)}
.scan-mode-bar.quiet-mode{background:var(--purple2);border:1px solid #8b5cf630;color:var(--purple)}
.scan-mode-bar.weekend-mode{background:var(--amber2);border:1px solid #f59e0b30;color:var(--amber)}
.smode-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1.5s ease-in-out infinite;flex-shrink:0}
.smode-info{flex:1}
.smode-title{font-weight:600;font-size:12px}
.smode-sub{font-size:10px;opacity:0.8;margin-top:1px}
.smode-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(0,0,0,0.3);border:1px solid currentColor;opacity:0.7}

/* ── Balance card ── */
.balance-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center}
.bal-num{font-family:var(--sans);font-size:24px;font-weight:800;color:var(--green);line-height:1}
.bal-sub{font-size:10px;color:var(--text3);margin-top:5px;letter-spacing:1px;text-transform:uppercase}
.bal-assets{margin-top:12px;display:flex;flex-direction:column;gap:5px}
.bal-row{display:flex;justify-content:space-between;font-size:11px;padding:5px 8px;background:var(--bg);border-radius:4px;border:1px solid var(--border)}

/* ── Perf chart ── */
.perf-bars{display:flex;align-items:flex-end;gap:4px;height:60px;margin-top:8px}
.perf-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.perf-bar{width:100%;border-radius:2px 2px 0 0;min-height:2px;transition:height 0.5s ease}
.perf-bar.win{background:var(--green)}
.perf-bar.loss{background:var(--red)}
.perf-bar-lbl{font-size:8px;color:var(--text3)}

/* ── Empty state ── */
.empty{text-align:center;padding:36px 20px;color:var(--text3)}
.empty .eicon{font-size:24px;margin-bottom:8px;opacity:0.5}
.empty .emsg{font-size:11px;line-height:1.6}

/* ── Responsive ── */
@media(max-width:1200px){.stats-row{grid-template-columns:repeat(4,1fr)}}
@media(max-width:900px){.sidebar{transform:translateX(-100%)}.main{margin-left:0}.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr}}
</style>
</head>
<script>
// ══ CONFIG ═══════════════════════════════════════════════
// Change to your Render.com URL e.g.:
const API_BASE = "https://crypto-ai-bot-na93.onrender.com";

// ── 20 coins — verified on Binance, matching config.py ──────────
const COIN_TIERS = {
  "big3":   { label:"👑 Big Three",          color:"var(--amber)",  coins:["BTCUSDT","ETHUSDT","BNBUSDT"] },
  "liq1":   { label:"⚡ High-Liquidity L1s", color:"var(--blue)",   coins:["SOLUSDT","AVAXUSDT","NEARUSDT","SUIUSDT","APTUSDT"] },
  "inst":   { label:"🏛 Institutional Alts", color:"var(--purple)", coins:["LINKUSDT","DOTUSDT","UNIUSDT","AAVEUSDT","XRPUSDT"] },
  "ai_mom": { label:"🤖 AI & Momentum",      color:"var(--cyan)",   coins:["FETUSDT","RENDERUSDT","ADAUSDT","INJUSDT","ARBUSDT","OPUSDT","SEIUSDT"] },
};
const SYMBOLS = Object.values(COIN_TIERS).flatMap(t => t.coins);
// Helper: get tier for a symbol
const getTier = sym => Object.entries(COIN_TIERS).find(([,t]) => t.coins.includes(sym));
const getTierColor = sym => { const t = getTier(sym); return t ? t[1].color : "var(--text2)"; };

let allSignals    = [];
let marketData    = [];
let sigFilter     = {dir:"all", conf:0, tier:null, coin:null};
let prevPrices    = {};
let btcAtrPct     = 0;
let isScanning    = false;
let apiOnline     = false;

// ══ FORMAT HELPERS ══════════════════════════════════════
const fmt    = (v, d) => v == null ? "—" : parseFloat(v).toFixed(d ?? (v < 10 ? 4 : 2));
const fmtPnl = v => v == null ? "—" : (v >= 0 ? "+" : "") + parseFloat(v).toFixed(4);
const fmtUSD = v => v == null ? "—" : "$" + parseFloat(v).toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
const esc    = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function timeAgo(iso) {
  if (!iso) return "—";
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 1) return "just now";
  if (m < 60) return m + "m ago";
  if (m < 1440) return Math.floor(m/60) + "h ago";
  return Math.floor(m/1440) + "d ago";
}

function duration(iso1, iso2) {
  try {
    const diff = Math.abs(new Date(iso2||Date.now()) - new Date(iso1));
    const m = Math.floor(diff/60000);
    if (m < 60) return m + "m";
    if (m < 1440) return Math.floor(m/60) + "h " + (m%60) + "m";
    return Math.floor(m/1440) + "d";
  } catch { return "—"; }
}

// ══ SCAN MODE ════════════════════════════════════════════
function getScanMode() {
  const now  = new Date();
  const utcH = now.getUTCHours();
  const dow  = now.getUTCDay(); // 0=Sun, 6=Sat
  const isWeekend = (dow === 0 || dow === 6);
  const isActive  = (utcH >= 8 && utcH < 20);

  if (isWeekend) return {
    mode:"weekend", label:"WEEKEND MODE", cls:"weekend-mode",
    sub:`Conf raised to 70% · ${isActive ? "15 min scan" : "30 min scan"}`,
    badge:"WEEKEND", interval: isActive ? 15 : 30, minConf: 70
  };
  if (isActive) return {
    mode:"active", label:"ACTIVE HOURS", cls:"active-mode",
    sub:"Min confidence: 65% · Min score: 3/6 · UTC 08:00–20:00",
    badge:"ACTIVE", interval:15, minConf:65
  };
  return {
    mode:"quiet", label:"QUIET HOURS", cls:"quiet-mode",
    sub:"Min confidence: 72% · ADX 30+ · UTC 00:00–08:00",
    badge:"QUIET", interval:30, minConf:72
  };
}

function updateScanMode() {
  const m = getScanMode();
  const now = new Date();
  const utcH = now.getUTCHours(), utcM = String(now.getUTCMinutes()).padStart(2,"0");
  const dow = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][now.getUTCDay()];

  // Sidebar mode
  const sm = document.getElementById("sidebarMode");
  sm.className = "mode-badge " + m.cls;
  document.getElementById("sidebarModeTitle").textContent = m.label;
  document.getElementById("sidebarModeSub").textContent   = `Scan every ${m.interval} min`;

  // Dashboard bar
  const bar = document.getElementById("scanModeBar");
  bar.className = "scan-mode-bar " + m.cls;
  document.getElementById("smodeTitleMain").textContent = m.label + " — Scanning every " + m.interval + " minutes";
  document.getElementById("smodeSubMain").textContent   = m.sub;
  document.getElementById("smodeBadge").textContent     = m.badge;

  // Config page
  const modeColors = {active:"var(--green)", quiet:"var(--purple)", weekend:"var(--amber)"};
  const cfgM = document.getElementById("cfgMode");
  if (cfgM) { cfgM.textContent = m.label; cfgM.style.color = modeColors[m.mode]; }
  const cfgT = document.getElementById("cfgTime");
  if (cfgT) cfgT.textContent = utcH + ":" + utcM + " UTC";
  const cfgD = document.getElementById("cfgDay");
  if (cfgD) { cfgD.textContent = dow; cfgD.style.color = (m.mode==="weekend") ? "var(--amber)" : "var(--text)"; }
  const ws = document.getElementById("weekendStatus");
  if (ws) ws.textContent = m.mode==="weekend" ? "ACTIVE NOW" : "Weekday";
}

async function fetchOpenTrades() {
  try {
    const r = await fetch(API_BASE + "/api/trades/open", {signal: AbortSignal.timeout(15000)});
    if (!r.ok) return;
    const trades = await r.json();

    document.getElementById("openBadge").textContent    = trades.length + " active";
    document.getElementById("tradeCount").textContent   = trades.length;

    const noTrades = `<div class="empty"><div class="eicon">📡</div><div class="emsg">No open trades.<br>Bot scans every 15 min for signals.</div></div>`;

    if (!trades.length) {
      document.getElementById("openTradesBody").innerHTML     = noTrades;

      document.getElementById("ot-upnl").textContent = "+0.0000";
      document.getElementById("ot-risk").textContent = "—";
      document.getElementById("ot-conf").textContent = "—";
      return;
    }

    const totalUpnl = trades.reduce((s,t) => s + (t.unrealised_pnl||0), 0);
    const totalRisk = trades.reduce((s,t) => s + (t.risk_usd||0), 0);
    const avgConf   = Math.round(trades.reduce((s,t) => s + (t.confidence||0), 0) / trades.length);

    const upnlEl = document.getElementById("ot-upnl");
    upnlEl.textContent = fmtPnl(totalUpnl) + " USDT";
    upnlEl.className   = "stat-value " + (totalUpnl >= 0 ? "green" : "red");

    const html = trades.map(t => tradeCardHTML(t)).join("");
    document.getElementById("openTradesBody").innerHTML     = html;
    document.getElementById("openTradesFullBody").innerHTML = html;

    // Highlight active coins in sidebar
    SYMBOLS.forEach(s => {
      const chip = document.getElementById("chip-" + s);
      if (chip) chip.classList.toggle("has-signal", !!trades.find(t => t.symbol === s));
    });
  } catch (e) {
    console.warn("Open trades:", e);
  }
}

// Fetch signals from API (or build from log)
async function fetchSignals() {
  try {
    const r = await fetch(API_BASE + "/api/signals", {signal: AbortSignal.timeout(15000)});
    if (r.ok) {
      const d = await r.json();
      allSignals = d;
    } else {
      throw new Error("no signals endpoint");
    }
  } catch {
    try {
      const r2 = await fetch(API_BASE + "/api/trades/history", {signal: AbortSignal.timeout(15000)});
      if (r2.ok) {
        const h = await r2.json();
        allSignals = h.map(t => ({...t, generated_at: t.opened_at}));
      }
    } catch {}
  }
  renderSignalsPage();
  renderRecentSignals();
  updateSignalStats();
}

function renderSignalsPage() {
  let data = [...allSignals];
  if (sigFilter.dir !== "all") data = data.filter(s => s.signal === sigFilter.dir.toUpperCase());
  if (sigFilter.tier) {
    const tierCoins = COIN_TIERS[sigFilter.tier]?.coins || [];
    data = data.filter(s => tierCoins.includes(s.symbol));
  } else if (sigFilter.coin) {
    data = data.filter(s => s.symbol === sigFilter.coin);
  }
  if (sigFilter.conf > 0) data = data.filter(s => (s.confidence||0) >= sigFilter.conf);

  document.getElementById("signalCount").textContent = data.length;

  const body = document.getElementById("signalsBody");
  if (!data.length) {
    body.innerHTML = `<div class="empty"><div class="eicon">⚡</div><div class="emsg">No signals match your filters.<br>Bot scans every 15 minutes across 20 pairs.</div></div>`;
    return;
  }
  body.innerHTML = [...data].reverse().map(s => signalCardHTML(s)).join("");
}

  <div class="signal-card ${(s.signal||"buy").toLowerCase()}">
    <div class="sc-top">
      <div class="sc-left">
        <span class="dir-tag ${(s.signal||"buy").toLowerCase()}">${s.signal||"BUY"}</span>
        <span class="sc-sym">${(s.symbol||"BTC").replace("USDT","")}<span style="color:var(--text3);font-size:11px"> USDT</span></span>
        <span class="sc-conf"><span>${s.confidence||0}%</span> conf</span>
        ${tierTag}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="stars">${stars}</span>
        <span class="sc-time">${timeAgo(s.generated_at||s.opened_at)}</span>
      </div>
    </div>
    <div class="sc-prices">
      <div class="sc-box"><div class="sc-lbl">Entry</div><div class="sc-val entry">${fmtUSD(s.entry)}</div></div>
      <div class="sc-box"><div class="sc-lbl">Stop Loss</div><div class="sc-val sl">${fmtUSD(s.stop)}</div></div>
      <div class="sc-box"><div class="sc-lbl">Target 1</div><div class="sc-val tp">${fmtUSD(s.tp1)}</div></div>
      <div class="sc-box"><div class="sc-lbl">Target 2</div><div class="sc-val tp">${fmtUSD(s.tp2)}</div></div>
    </div>

}

function renderRecentSignals() {
  const recent = [...allSignals].reverse().slice(0, 5);
  const body   = document.getElementById("recentSignalsBody");
  if (!recent.length) {
    body.innerHTML = `<div class="empty"><div class="eicon">⚡</div><div class="emsg">No signals yet</div></div>`;
    return;
  }
  document.getElementById("recentSigBadge").textContent = "last " + recent.length;

function updateSignalStats() {
  const buys  = allSignals.filter(s => s.signal === "BUY").length;
  const sells = allSignals.filter(s => s.signal === "SELL").length;
  const total = allSignals.length;
  const avgC  = total ? Math.round(allSignals.reduce((a,s) => a+(s.confidence||0),0)/total) : 0;

  document.getElementById("statSigToday").textContent = total;
  document.getElementById("statSigSub").textContent   = `${buys} BUY · ${sells} SELL`;
  document.getElementById("sig-total").textContent    = total;
  document.getElementById("sig-buy").textContent      = buys;
  document.getElementById("sig-sell").textContent     = sells;
  document.getElementById("sig-avgconf").textContent  = avgC ? avgC + "%" : "—";
  document.getElementById("signalCount").textContent  = total;
}

// ── BULLETPROOF TOGGLE FILTERS ──
function filterSig(dir, btn) {
  const group = btn.closest(".filter-group");
  if (btn.classList.contains("active") && dir !== 'all') {
    sigFilter.dir = 'all';
    group.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active"));
    document.getElementById("fbtn-all").classList.add("active");
  } else {
    sigFilter.dir = dir;
    group.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  }
  renderSignalsPage();
}

function filterCoin(coin, btn) {
  const group = btn.closest(".filter-group");
  if (btn.classList.contains("active")) {
    sigFilter.coin = null; 
    btn.classList.remove("active");
  } else {
    sigFilter.coin = coin;
    sigFilter.tier = null; 
    group.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  }
  renderSignalsPage();
}

function filterTier(tierKey, btn) {
  const group = btn.closest(".filter-group");
  if (btn.classList.contains("active")) {
    sigFilter.tier = null; 
    btn.classList.remove("active");
  } else {
    sigFilter.tier = tierKey;
    sigFilter.coin = null; 
    group.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  }
  renderSignalsPage();
}

function filterConf(conf, btn) {
  const group = btn.closest(".filter-group");
  if (btn.classList.contains("active") && conf !== 0) {
    sigFilter.conf = 0;
    group.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active"));
    document.getElementById("fbtn-conf-any").classList.add("active");
  } else {
    sigFilter.conf = conf;
    group.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  }
  renderSignalsPage();
}

async function fetchMarketPrices() {
  try {
    const symJson = JSON.stringify(SYMBOLS);
    const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=${encodeURIComponent(symJson)}`, {signal: AbortSignal.timeout(15000)});
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    if (!Array.isArray(data)) throw new Error();
    marketData = data;

    // BTC ATR calc (using range as proxy)
    const btc = data.find(d => d.symbol === "BTCUSDT");
    if (btc) {
      const price = parseFloat(btc.lastPrice);
      const high  = parseFloat(btc.highPrice);
      const low   = parseFloat(btc.lowPrice);
      const atr   = (high - low);
      btcAtrPct   = (atr / price * 100);

      document.getElementById("btcPrice").textContent  = fmtUSD(price);
      document.getElementById("btcAtr").textContent    = atr.toFixed(2);
      document.getElementById("btcAtrPct").textContent = btcAtrPct.toFixed(2) + "%";

      const chg    = parseFloat(btc.priceChangePercent);
      const chgEl  = document.getElementById("btcChg");
      chgEl.textContent = (chg >= 0 ? "+" : "") + chg.toFixed(2) + "%";
      chgEl.style.color = chg >= 0 ? "var(--green)" : "var(--red)";

      // Volatility banner
      const banner = document.getElementById("volBanner");
      const volTxt = document.getElementById("volText");
      const cfgAtr = document.getElementById("cfgAtr");
      if (btcAtrPct > 2) {
        banner.className = "vol-banner high";
        volTxt.textContent = `⚠️ HIGH VOLATILITY — BTC ATR ${btcAtrPct.toFixed(2)}% · Reduce position size!`;
        if (cfgAtr) { cfgAtr.textContent = "HIGH"; cfgAtr.style.color = "var(--red)"; }
      } else if (btcAtrPct < 0.3) {
        banner.className = "vol-banner low";
        volTxt.textContent = `⚠️ LOW VOLATILITY — BTC ATR ${btcAtrPct.toFixed(2)}% · Market ranging, scan skipped`;
        if (cfgAtr) { cfgAtr.textContent = "LOW (skip)"; cfgAtr.style.color = "var(--amber)"; }
      } else {
        banner.className = "vol-banner normal";
        volTxt.textContent = `✓ Normal volatility — BTC ATR ${btcAtrPct.toFixed(2)}% · Full scan running`;
        if (cfgAtr) { cfgAtr.textContent = "Normal"; cfgAtr.style.color = "var(--green)"; }
      }
    }
    renderMarketPage();
  } catch (e) {
    console.warn("Market prices:", e.message);
    // Fallback individual
    for (const sym of ["BTCUSDT","ETHUSDT"]) {
      try {
        const r2 = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${sym}`, {signal: AbortSignal.timeout(15000)});
        if (r2.ok) marketData.push(await r2.json());
      } catch {}
    }
    renderMarketPage();
  }
}

function renderMarketPage() {
  if (!marketData.length) return;
  const gainers = marketData.filter(d => parseFloat(d.priceChangePercent) > 0).length;
  document.getElementById("mkt-gainers").textContent = gainers;
  document.getElementById("mkt-losers").textContent  = marketData.length - gainers;

  const sorted = [...marketData].sort((a,b) => parseFloat(b.priceChangePercent) - parseFloat(a.priceChangePercent));
  const best   = sorted[0], worst = sorted[sorted.length-1];
  if (best) {
    document.getElementById("mkt-best").textContent     = "+" + parseFloat(best.priceChangePercent).toFixed(1) + "%";
    document.getElementById("mkt-best-sym").textContent = best.symbol.replace("USDT","");
  }
  if (worst) {
    document.getElementById("mkt-worst").textContent     = parseFloat(worst.priceChangePercent).toFixed(1) + "%";
    document.getElementById("mkt-worst-sym").textContent = worst.symbol.replace("USDT","");
  }

  // Build market data lookup
  const bySymbol = {};
  marketData.forEach(t => { bySymbol[t.symbol] = t; });

  // Render tier-grouped
  const grid = document.getElementById("mktPairsGrid");
  grid.innerHTML = Object.entries(COIN_TIERS).map(([key, tier]) => {
    const tiledCoins = tier.coins.map(sym => {
      const t = bySymbol[sym];
      if (!t) return `<div class="market-card" style="opacity:0.4"><div class="mc-head"><span class="mc-sym" style="color:${tier.color}">${sym.replace("USDT","")}</span><span class="mc-chg" style="background:var(--bg);color:var(--text3)">—</span></div><div class="mc-price">loading...</div></div>`;
      const price = parseFloat(t.lastPrice);
      const chg   = parseFloat(t.priceChangePercent);
      const high  = parseFloat(t.highPrice);
      const low   = parseFloat(t.lowPrice);
      const vol   = parseFloat(t.quoteVolume);
      const range = high - low;
      const pos   = range > 0 ? ((price - low) / range * 100) : 50;
      const volFmt= vol > 1e9 ? (vol/1e9).toFixed(1)+"B" : vol > 1e6 ? (vol/1e6).toFixed(0)+"M" : vol.toFixed(0);
      return `
      <div class="market-card" style="border-top:2px solid ${tier.color}40">
        <div class="mc-head">
          <span class="mc-sym" style="color:${tier.color}">${sym.replace("USDT","")}</span>
          <span class="mc-chg ${chg>=0?"up":"down"}">${chg>=0?"+":""}${chg.toFixed(2)}%</span>
        </div>
        <div class="mc-price">${fmtUSD(price)}</div>
        <div class="mc-vol">Vol $${volFmt}</div>
        <div class="mc-range">
          <div class="mc-range-fill" style="left:${Math.min(pos,95)}%;width:5%;background:${tier.color}"></div>
        </div>
        <div class="mc-range-labels"><span>${fmtUSD(low)}</span><span>${fmtUSD(high)}</span></div>
      </div>`;
    }).join("");
    return `
    <div style="grid-column:1/-1;display:flex;align-items:center;gap:8px;margin:10px 0 4px">
      <span style="font-size:11px;font-weight:600;color:${tier.color}">${tier.label}</span>
      <div style="flex:1;height:1px;background:${tier.color}25"></div>
    </div>
    ${tiledCoins}`;
  }).join("");
}

// ══ FEAR & GREED ═════════════════════════════════════════
async function fetchFearGreed() {
  try {
    const r = await fetch("https://api.alternative.me/fng/", {signal: AbortSignal.timeout(15000)});
    const d = await r.json();
    const val = parseInt(d.data[0].value);
    const lbl = d.data[0].value_classification;

    document.getElementById("fgNum").textContent = val;
    document.getElementById("fgLabel").textContent = lbl;
    document.getElementById("fgCursor").style.left = val + "%";

    const color = val < 25 ? "var(--green)" : val < 45 ? "var(--cyan)" :
                  val < 55 ? "var(--text2)" : val < 75 ? "var(--amber)" : "var(--red)";
    document.getElementById("fgNum").style.color = color;

    // Highlight active zone
    const zones = ["fgz0","fgz1","fgz2","fgz3","fgz4"];
    const thresholds = [25,45,55,75,101];
    zones.forEach((id,i) => {
      const z = document.getElementById(id);
      if (z) z.classList.toggle("active-zone", val < thresholds[i] && (i===0 || val >= thresholds[i-1]));
    });

    const advice = val < 25  ? "🟢 Extreme Fear — historically strong buying opportunity" :
                   val < 45  ? "🔵 Fear — be cautious, wait for confirmation before entry" :
                   val < 55  ? "⚪ Neutral — follow individual coin signals" :
                   val < 75  ? "🟡 Greed — ride trends carefully with tight stop losses" :
                               "🔴 Extreme Greed — high reversal risk, reduce position sizes";
    document.getElementById("fgAdvice").textContent = advice;
  } catch {}
}

// ══ LOG ══════════════════════════════════════════════════
async function fetchLog() {
  try {
    const r = await fetch(API_BASE + "/api/log", {signal: AbortSignal.timeout(15000)});
    if (!r.ok) return;
    const d  = await r.json();
    const panel = document.getElementById("logPanel");
    panel.innerHTML = d.lines.map(line => {
      const cls = line.includes("SIGNAL")||line.includes("✅") ? "sig" :
                  line.includes("ERROR")||line.includes("error") ? "err" :
                  line.includes("warn")||line.includes("Warning") ? "wrn" : "";
      return `<span class="log-line ${cls}">${esc(line)}</span>`;
    }).join("\n");
    panel.scrollTop = panel.scrollHeight;
    document.getElementById("logBadge").textContent = d.lines.length + " lines";
  } catch {
    document.getElementById("logPanel").innerHTML = '<span class="log-line wrn">API offline — run dashboard_api.py</span>';
  }
}

// ══ HISTORY ══════════════════════════════════════════════
async function fetchHistory() {
  try {
    const r = await fetch(API_BASE + "/api/trades/history", {signal: AbortSignal.timeout(15000)});
    if (!r.ok) return;
    const history = await r.json();

    document.getElementById("histBadge").textContent = history.length + " trades";
    const totalPnl = history.reduce((s,h) => s+(h.pnl||0), 0);
    const pEl = document.getElementById("h-pnl");
    pEl.textContent = fmtPnl(totalPnl) + " USDT";
    pEl.className   = "stat-value " + (totalPnl >= 0 ? "green" : "red");

    if (!history.length) return;
    document.getElementById("histBody").innerHTML = [...history].reverse().map(h => {
      const dec     = (h.entry||0) < 10 ? 4 : 2;
      const pnl     = h.pnl ?? 0;
      const res     = pnl > 0 ? "win" : "loss";
      const tierInf = getTier(h.symbol);
      const tierCol = tierInf ? tierInf[1].color : "var(--text3)";
      const tierLbl = tierInf ? tierInf[1].label.split(' ').slice(1).join(' ') : "—";
      return `<tr>
        <td style="font-weight:600;color:${tierCol}">${(h.symbol||"").replace("USDT","")}</td>
        <td style="font-size:9px;color:${tierCol};opacity:0.7">${tierLbl}</td>
        <td><span class="tag ${(h.signal||"buy").toLowerCase()}">${h.signal||"BUY"}</span></td>
        <td style="color:var(--blue)">${fmtUSD(h.entry)}</td>
        <td>${fmtUSD(h.close_price)}</td>
        <td style="color:${pnl>=0?"var(--green)":"var(--red)"};font-weight:600">${fmtPnl(pnl)}</td>
        <td><span class="tag ${res}">${res.toUpperCase()}</span></td>
        <td style="color:var(--text3)">${timeAgo(h.opened_at)}</td>
        <td style="color:var(--text3)">${duration(h.opened_at, h.closed_at)}</td>
        <td style="color:var(--text3)">${(h.close_reason||"auto").substring(0,12)}</td>
      </tr>`;
    }).join("");
  } catch {}
}

// ══ PERFORMANCE ══════════════════════════════════════════
function renderPerformancePage() {
  try {
    fetch(API_BASE + "/api/trades/history", {signal: AbortSignal.timeout(15000)})
      .then(r => r.json()).then(history => {
        if (!history.length) return;
        const wins   = history.filter(h => (h.pnl||0) > 0);
        const losses = history.filter(h => (h.pnl||0) <= 0);
        const best   = Math.max(...history.map(h => h.pnl||0));
        const worst  = Math.min(...history.map(h => h.pnl||0));
        const avgWin = wins.length   ? wins.reduce((s,h)=>s+(h.pnl||0),0)/wins.length     : 0;
        const avgLoss= losses.length ? losses.reduce((s,h)=>s+(h.pnl||0),0)/losses.length : 0;
        const bestH  = history.find(h => h.pnl === best);
        const worstH = history.find(h => h.pnl === worst);

        document.getElementById("p-best").textContent      = fmtPnl(best);
        document.getElementById("p-best-sym").textContent  = bestH?.symbol?.replace("USDT","") || "—";
        document.getElementById("p-worst").textContent     = fmtPnl(worst);
        document.getElementById("p-worst-sym").textContent = worstH?.symbol?.replace("USDT","") || "—";
        document.getElementById("p-avgwin").textContent    = fmtPnl(avgWin);
        document.getElementById("p-avgloss").textContent   = fmtPnl(avgLoss);

        // PnL bars
        const maxAbs = Math.max(...history.map(h => Math.abs(h.pnl||0)), 0.001);
        document.getElementById("perfBars").innerHTML = history.slice(-20).map(h => {
          const pnl = h.pnl || 0;
          const h_  = Math.round((Math.abs(pnl) / maxAbs) * 76) + 4;
          const cls = pnl >= 0 ? "win" : "loss";
          return `<div class="perf-bar-wrap"><div class="perf-bar ${cls}" style="height:${h_}px" title="${fmtPnl(pnl)} USDT"></div></div>`;
        }).join("");

        // W/L ratio donut (CSS based)
        const wr = wins.length / history.length * 100;
        document.getElementById("wlRatioBody").innerHTML = `
          <div style="text-align:center">
            <div style="font-family:var(--sans);font-size:40px;font-weight:800;color:${wr>=50?"var(--green)":"var(--red)"}">${wr.toFixed(1)}%</div>
            <div style="font-size:11px;color:var(--text2);margin:4px 0 14px">Win Rate</div>
            <div style="display:flex;height:8px;border-radius:4px;overflow:hidden;gap:2px">
              <div style="flex:${wins.length};background:var(--green);border-radius:4px 0 0 4px"></div>
              <div style="flex:${losses.length};background:var(--red);border-radius:0 4px 4px 0"></div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:5px">
              <span style="color:var(--green)">${wins.length} wins</span>
              <span style="color:var(--red)">${losses.length} losses</span>
            </div>
          </div>`;

        // Coin performance grouped by tier
        const byCoin = {};
        history.forEach(h => {
          const s = h.symbol;
          if (!byCoin[s]) byCoin[s] = {wins:0,losses:0,pnl:0};
          if ((h.pnl||0) > 0) byCoin[s].wins++; else byCoin[s].losses++;
          byCoin[s].pnl += (h.pnl||0);
        });
        // Render grouped by tier
        const tierHtml = Object.entries(COIN_TIERS).map(([key, tier]) => {
          const tierCoins = tier.coins.filter(s => byCoin[s]);
          if (!tierCoins.length) return "";
          const coinCards = tierCoins.map(sym => {
            const d = byCoin[sym];
            const wr2 = d.wins/(d.wins+d.losses)*100;
            return `<div style="background:var(--bg3);border:1px solid ${tier.color}30;border-radius:7px;padding:12px">
              <div style="font-family:var(--sans);font-weight:700;color:${tier.color};margin-bottom:6px">${sym.replace("USDT","")}</div>
              <div style="font-size:11px;color:${d.pnl>=0?"var(--green)":"var(--red)"};font-weight:600;margin-bottom:4px">${fmtPnl(d.pnl)} USDT</div>
              <div style="font-size:10px;color:var(--text3)">${d.wins}W ${d.losses}L · ${wr2.toFixed(0)}%</div>
            </div>`;
          }).join("");
          return `<div style="grid-column:1/-1;display:flex;align-items:center;gap:8px;margin:6px 0 2px">
              <span style="font-size:11px;color:${tier.color};font-weight:600">${tier.label}</span>
              <div style="flex:1;height:1px;background:${tier.color}25"></div>
            </div>${coinCards}`;
        }).join("");
        document.getElementById("coinPerfGrid").innerHTML = tierHtml ||
          `<div class="empty" style="grid-column:1/-1"><div class="emsg">No data yet</div></div>`;
      }).catch(() => {});
  } catch {}
}

// ══ SCAN + CLOSE ══════════════════════════════════════════
async function triggerScan() {
  if (isScanning) return;
  isScanning = true;
  const btn = document.getElementById("scanBtn");
  btn.textContent = "⟳ Scanning...";
  btn.classList.add("running");
  btn.disabled = true;
  try {
    const r = await fetch(API_BASE + "/api/scan", {method:"POST", signal: AbortSignal.timeout(15000)});
    const d = await r.json();
    btn.textContent = d.ok ? "✓ Started" : "✕ Failed";
  } catch {
    btn.textContent = "✕ Offline";
  }
  setTimeout(() => {
    btn.textContent = "▶ Scan Now";
    btn.classList.remove("running");
    btn.disabled = false;
    isScanning = false;
  }, 4000);
}

async function closeTrade(symbol) {
  if (!confirm(`Close ${symbol} at market price now?`)) return;
  try {
    const r = await fetch(API_BASE + "/api/close_trade", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({symbol})
    });
    const d = await r.json();
    if (d.ok) { alert(`${symbol} closed. PnL: ${fmtPnl(d.pnl)} USDT`); refreshAll(); }
    else alert("Error: " + d.error);
  } catch (e) { alert("API error: " + e.message); }
}

// ══ FULL REFRESH ════════════════════════════════════════
async function refreshAll() {
  updateScanMode();
  await Promise.allSettled([
    fetchStatus(),
    fetchBalance(),
    fetchOpenTrades(),
    fetchHistory(),
    fetchLog(),
    fetchSignals(),
    fetchMarketPrices(),
    fetchFearGreed(),
  ]);
}

buildCoinChips();
refreshAll();

setInterval(refreshAll,          30000);
setInterval(fetchMarketPrices,    8000);

setInterval(fetchOpenTrades,     15000);
</script>
